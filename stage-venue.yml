                - paragraph [ref=e867]:
                  - paragraph [ref=e868]: This вАЬSelect a rateвАЭ tool repayment estimator is indicative only, and does not take into account your personal circumstances, finance offer changes, fees, charges and interest rate differences. The results of this calculator should not be relied upon for the purpose of a loan application and is not an offer for the purpose of obtaining finance. Approved applicants only. Terms, conditions, fees, charges, lending and eligibility criteria apply. Hyundai Capital Australia Pty Ltd (ABN 42 611 226 316), Australian Credit Licence 554051 trading as Hyundai Finance.
                  - paragraph [ref=e869]
                  - paragraph [ref=e870]: Variance in estimates
                  - paragraph [ref=e871]: The Drive Away Price, estimated repayment and Guaranteed Future Value displayed may differ between the вАШSelect a rateвАЩ and вАШPersonalised interest rateвАЩ options, due to differences in underlying data sources and update timing. All figures shown are indicative only and subject to change.
                - paragraph [ref=e874]:
                  - strong [ref=e875]: "[D]"
                  - text: The Drive-away Price is an estimated price which includes the manufacturerвАЩs recommended list price (MLP) for the vehicle, 12 months registration, compulsory third party insurance (CTP) based on a private purchaser with a good driving record, an estimated charge for dealer delivery, stamp duty, luxury car tax (if applicable) and the options entered. Actual drive away price may differ depending on your state, choice of authorised Hyundai dealer, your individual circumstances, and your choice of insurer. Accordingly, please contact your local Hyundai Dealer to confirm the price that is specific to you. Always consult your authorised Hyundai dealer for the latest information on Hyundai vehicles and to confirm specification and pricing. To the maximum extent permitted by law, Hyundai Motor Company Australia provides no warranty as to the reliability, completeness, or accuracy of the information on this tool and accepts no liability for the content contained within this tool.
                - paragraph [ref=e877]:
                  - strong [ref=e878]: "[F1]"
                  - text: The Hyundai Finance Personalised Pricing tool (including all rates and repayments) is indicative only and is not an offer or quote for finance. It is generated using information you provide and may include your credit score, deposit amount, loan term, repayment frequency and estimated kilometre usage. Final rates and terms will depend on a full credit assessment, verification of your financial position and satisfaction of Hyundai FinanceвАЩs lending criteria. It does not constitute financial advice. You should consider whether any Hyundai Finance product is appropriate for your circumstances and seek independent legal, financial or tax advice if necessary.
                - paragraph [ref=e880]:
                  - strong [ref=e881]: "[F2]"
                  - text: The estimated repayment is indicative only. Finance to approved applicants only. Terms, conditions, fees, charges, lending and eligibility criteria apply. Repayments include fees and charges but do not include a Dealer Agency Fee applicable to consumer loans (up to $1200) or a Dealer Origination Fee applicable to business loans (up to $1300) which may also apply. If applicable, such fees will increase the estimated repayment amount.
                - paragraph [ref=e883]:
                  - strong [ref=e884]: "[F3]"
                  - text: The Guaranteed Future Value (GFV) is the minimum future value of your approved Hyundai set out in your contract. At the end of the term, you can choose to sell your car to us, and we will pay the GFV which you can deduct from the amount you pay us under the contract on the last day of term. We will only pay the GFV if, on the last day of term, you're not in default under your contract, your contract has not ended early, and you have met the fair wear and tear requirements and the agreed kilometres. Adjustments to the GFV may apply that result in you having to pay any shortfall to meet your obligations under the contract. Approved applicants only. Terms, conditions, fees, charges, lending and eligibility criteria apply.
                - paragraph [ref=e886]:
                  - strong [ref=e887]: "[F4]"
                  - generic [ref=e888]: "Comparison rate is based on a 5 year secured consumer fixed rate loan of $30,000. WARNING: This comparison rate is true only for the examples given and may not include all fees and charges. Different terms, fees or other loan amounts might result in a different comparison rate."
                - paragraph [ref=e889]:
                  - paragraph [ref=e891]: Please note we are experiencing delivery delays for some Hyundai Venue Elites. Contact your local dealer for more details.
                - paragraph [ref=e892]:
                  - paragraph [ref=e894]: Availability of vehicles at individual dealers is based on Hyundai Australia records at the time of publication. Real time availability cannot be guaranteed and should be confirmed with individual dealers.
