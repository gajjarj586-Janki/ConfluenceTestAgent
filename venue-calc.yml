          - generic [ref=e121]:
            - paragraph [ref=e122]: "[H1] 7 Year Unlimited Km Warranty"
            - paragraph [ref=e123]:
              - text: In addition to the 5 Year Standard New Car Warranty, Hyundai provides an extended warranty for up to a further 2 years, when all servicing is with Hyundai, on passenger vehicles first registered from June 1, 2025. Maximum warranty is 7 years from date of first registration, on the condition that all scheduled services are completed within the specified service intervals at an authorised Hyundai dealer. Otherwise, the standard 5 year unlimited km warranty (from the date of first registration) applies. Service conditions apply. Excludes Hybrid & EV drive batteries, which are warranted for 8 years / 160,000km (whichever occurs first) from the date of first registration. Does not apply if the vehicle is used at any time during the warranty period used for a вАЬcommercial applicationвАЭ as defined in the warranty policy, which includes use as a taxi, hire, ride-share, rental, courier, delivery, security, driving school, tour, bus operator or emergency vehicle, or any other use in the course of trade for the purpose of carrying passengers or goods. Passenger vehicles used for a commercial application are provided with a 5 year/130,000km warranty (whichever occurs first). People Mover Vans used for a commercial application are provided with a 5 year/160,000km warranty (whichever occurs first). Commercial Vans are provided with a 5 year/160,000km warranty (whichever occurs first) regardless of its usage. Terms, conditions and exclusions apply, view the
              - link "Warranty page" [ref=e125] [cursor=pointer]:
                - /url: /au/en/owning/myhyundaicare/warranty
              - text: .
            - paragraph [ref=e126]: "[H2] Genuine Service Plan"
            - paragraph [ref=e127]:
              - text: For the benefit of Hyundai owners, Hyundai provides online quotes, which specify the maximum price applicable for a vehicle's next scheduled maintenance service at a participating authorised Hyundai dealer and using Hyundai Genuine Parts (where required). Online quotes are available at www.hyundai.com/au/en/find-a-dealer#service apply for a stated effective period only and may change after that effective period without notice. Standard scheduled maintenance services are of limited scope. The benefit of online quotes is available for all Hyundai's, for their lifetime. To see the full terms and conditions of the Hyundai Genuine Service Plan Program, please visit
              - link "hyundai.com/au/en/owning/servicing" [ref=e129] [cursor=pointer]:
                - /url: /au/en/owning/servicing
              - text: .
            - paragraph [ref=e130]: "[H3] Premium Roadside Support Plan"
            - paragraph [ref=e131]: 12 months included Premium Roadside Support when you buy a new Hyundai internal combustion engine or hybrid vehicle from a participating authorised Hyundai Dealer. For purchases from a participating authorised Hyundai Dealer of new Hyundai battery electric vehicle Hyundai offers 24 months included Premium Roadside Support. Premium Roadside Support commences from the date of the vehicleвАЩs warranty commencement.
            - paragraph [ref=e132]:
              - text: When you have your Hyundai internal combustion engine or hybrid vehicleвАЩs scheduled service completed at a participating authorised Hyundai Dealer, you will receive 12 months of included Premium Roadside Support from the date of service. For Hyundai battery electric vehicles, that have their scheduled service completed at a participating authorised Hyundai Dealer, you will receive 24 months of included Premium Roadside Support from the date of service. Available for all Hyundai vehicles (excluding rental buyers and taxis). Terms, conditions and exclusions apply, visit
              - link "hyundai.com/au/en/owning/myhyundaicare/roadside-support" [ref=e134] [cursor=pointer]:
                - /url: /au/en/owning/myhyundaicare/roadside-support
              - text: .
            - paragraph [ref=e135]: "[H4] Sat Nav Update Plan"
            - paragraph [ref=e136]:
              - text: Applies to new Hyundai vehicles with both 8вАЭ and 10.25вАЭ factory-fitted satellite navigation. Updates are delivered annually and are included if the vehicle completes a scheduled service at an authorised Hyundai Dealer. Updates must be undertaken within 10 years of the vehicleвАЩs first registration date, with a maximum number of 9 updates. Visit
              - link "hyundai.com/au/en/owning/myhyundaicare/sat-nav-plan" [ref=e138] [cursor=pointer]:
                - /url: /au/en/owning/myhyundaicare/sat-nav-plan
